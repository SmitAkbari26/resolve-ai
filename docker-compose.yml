# Resolve AI - Infrastructure Services
# Run: docker-compose up -d

version: "3.9"

services:
  # ─── PostgreSQL (Relational Database) ─────────────────
  postgres:
    image: postgres:16-alpine
    container_name: resolveai-postgres
    environment:
      POSTGRES_USER: resolve_ai
      POSTGRES_PASSWORD: resolve_ai_pass
      POSTGRES_DB: resolve_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resolve_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Memory Store / Cache) ─────────────────────
  redis:
    image: redis:7-alpine
    container_name: resolveai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: